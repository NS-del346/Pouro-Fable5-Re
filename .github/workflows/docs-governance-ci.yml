name: Docs Governance CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: docs-governance
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate changed-line whitespace
        env:
          BASE_SHA_PR: "${{ github.event.pull_request.base.sha }}"
          BASE_SHA_BEFORE: "${{ github.event.before }}"
        shell: bash
        run: |
          set -euo pipefail

          # Empty tree SHA — compares against a tree with no files
          EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              base_sha="${BASE_SHA_PR}"
              ;;
            push)
              base_sha="${BASE_SHA_BEFORE}"
              if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
                root_sha="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
                if [[ "${root_sha}" == "$(git rev-parse HEAD)" ]]; then
                  base_sha="${EMPTY_TREE}"
                else
                  base_sha="${root_sha}"
                fi
              fi
              ;;
            workflow_dispatch)
              # Full-tree scan against empty tree so no files are silently skipped
              base_sha="${EMPTY_TREE}"
              ;;
            *)
              echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          echo "Checking diff from ${base_sha} to HEAD"
          git diff --check "${base_sha}...HEAD"

      - name: Parse YAML files
        shell: bash
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require "psych"

          files = Dir
            .glob("**/*.{yaml,yml}", File::FNM_DOTMATCH)
            .select { |path| File.file?(path) }
            .sort

          abort "No YAML files found" if files.empty?

          files.each do |file|
            Psych.parse_file(file)
            puts "YAML OK: #{file}"
          end
          RUBY

      - name: Validate required governance files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "LICENSE"
            "README.md"
            ".github/pull_request_template.md"
            ".github/workflows/docs-governance-ci.yml"
            "docs/PROJECT_CHARTER.md"
            "docs/CURRENT_STATUS.md"
            "docs/SOURCE_OF_TRUTH_INDEX.md"
            "docs/COMPLETION_CONTRACT.yaml"
            "docs/PR_BACKLOG.yaml"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "${file}" ]]; then
              echo "Missing required file: ${file}" >&2
              exit 1
            fi
            echo "Required file OK: ${file}"
          done

      - name: Validate governance text safety
        shell: bash
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require "psych"

          required_files = [
            "LICENSE",
            "README.md",
            ".github/pull_request_template.md",
            ".github/workflows/docs-governance-ci.yml",
            "docs/PROJECT_CHARTER.md",
            "docs/CURRENT_STATUS.md",
            "docs/SOURCE_OF_TRUTH_INDEX.md",
            "docs/COMPLETION_CONTRACT.yaml",
            "docs/PR_BACKLOG.yaml"
          ]

          FORBIDDEN_KEYS = %w[auto_merge merge_authorized production_deploy_authorized].freeze

          def check_forbidden_yaml_flags(obj, file, path = "")
            case obj
            when Hash
              obj.each do |key, value|
                key_str = key.to_s
                if FORBIDDEN_KEYS.include?(key_str) && value == true
                  abort "Forbidden authorization flag #{key_str}: true in #{file}" \
                        "#{path.empty? ? "" : " at #{path}"}"
                end
                check_forbidden_yaml_flags(value, file, "#{path}.#{key_str}")
              end
            when Array
              obj.each_with_index do |item, idx|
                check_forbidden_yaml_flags(item, file, "#{path}[#{idx}]")
              end
            end
          end

          required_files.each do |file|
            data = File.binread(file)

            abort "NUL byte detected in #{file}" if data.include?("\0")

            text = data.dup.force_encoding(Encoding::UTF_8)
            abort "Invalid UTF-8 in #{file}" unless text.valid_encoding?

            # Fence-aware scan: skip content inside ``` or ~~~ fenced blocks
            in_fence = false
            text.each_line.with_index(1) do |line, line_number|
              normalized = line.delete_suffix("\n").delete_suffix("\r")
              stripped = normalized.lstrip

              if stripped.start_with?("```") || stripped.start_with?("~~~")
                in_fence = !in_fence
                next
              end

              next if in_fence

              # Conflict markers are only meaningful outside fences
              if normalized.match?(/^<<<<<<< /)
                abort "Conflict marker detected: #{file}:#{line_number}"
              end
              if normalized.match?(/^>>>>>>> /)
                abort "Conflict marker detected: #{file}:#{line_number}"
              end
              # Bare ======= on its own line outside a fence is the conflict separator
              if normalized == "======="
                abort "Conflict marker detected: #{file}:#{line_number}"
              end
            end

            # For YAML files: verify parsed boolean values for authorization flags.
            # Regex-only checks miss YAML 1.1 truthy variants; parsed values do not.
            if file.end_with?(".yaml", ".yml")
              parsed = Psych.safe_load(text, aliases: true)
              check_forbidden_yaml_flags(parsed, file) if parsed
            end

            puts "Text safety OK: #{file}"
          end
          RUBY

      - name: Validate Markdown links and fences
        shell: bash
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require "pathname"

          repo_root = Pathname.new(Dir.pwd).realpath.to_s

          markdown_files = `git ls-files "*.md"`
            .lines
            .map(&:strip)
            .reject(&:empty?)
            .sort

          link_pattern = /\[[^\]]+\]\(([^)]+)\)/

          markdown_files.each do |file|
            text = File.read(file, encoding: "UTF-8")

            # Fence-aware processing: track state to skip content inside code blocks
            in_fence = false
            link_targets = []

            text.each_line do |line|
              stripped = line.lstrip
              if stripped.start_with?("```") || stripped.start_with?("~~~")
                in_fence = !in_fence
                next
              end

              next if in_fence

              line.scan(link_pattern).flatten.each { |t| link_targets << t }
            end

            # in_fence still true at EOF means unbalanced delimiters
            if in_fence
              abort "Unbalanced fenced code blocks: #{file}"
            end

            link_targets.each do |raw_target|
              target = raw_target.strip
              target = target.split(/[[:space:]]+["']/, 2).first
              target = target.delete_prefix("<").delete_suffix(">")

              next if target.empty?
              next if target.start_with?("#")
              next if target.match?(%r{\Ahttps?://}i)
              next if target.match?(%r{\Amailto:}i)

              path = target.split(/[?#]/, 2).first
              next if path.nil? || path.empty?

              resolved_abs = File.expand_path(path, File.join(repo_root, File.dirname(file)))

              # Reject any path that escapes the repository root
              unless resolved_abs == repo_root || resolved_abs.start_with?(repo_root + "/")
                abort "Link escapes repository root: #{file} -> #{target}" \
                      " (resolved: #{resolved_abs})"
              end

              unless File.exist?(resolved_abs)
                abort "Broken relative link: #{file} -> #{target}" \
                      " (resolved: #{resolved_abs})"
              end

              puts "Link OK: #{file} -> #{target}"
            end

            puts "Markdown structure OK: #{file}"
          end
          RUBY
